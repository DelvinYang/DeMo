defaults:
  - datamodule: av2  # 'av2' for 'DeMo', 'av2_stream' for 'DeMo+RealMotion'
  - model: model_forecast  # 'model_forecast' | 'model_forecast_snn_v1' | 'model_forecast_snn_v2' | 'stream_model_forecast'
  - _self_
# eg: For 'DeMo'
# defaults:
#   - datamodule: av2
#   - model: model_forecast

hydra:
  run:
    dir: outputs/${output}/${now:%Y%m%d-%H%M%S}

seed: 2024
monitor: val_minFDE6
save_top_k: 10

data_root:
checkpoint:
pretrained_weights:
output: change_${datamodule.name}_${datamodule.phase}_${model.name}_${model.phase}

# trainer
num_workers: 4
gpus: 4  # default to 4 GPUs for train/val
sync_bn: true
batch_size: 16
epochs: 60
warmup_epochs: 10

# optimizer
lr: 0.003  
weight_decay: 1e-2  
gradient_clip_val: 5
gradient_clip_algorithm: norm

limit_train_batches: 0.1
limit_val_batches: 0.1
limit_test_batches:
log_every_n_steps: 10
log_model: all
test: false  # false for val, true for test
