name: snn_v3
phase: default

target:
  _target_: src.model.trainer_forecast.Trainer
  model:
    type: 'SNNModelForecastV3'
    embed_dim: 128
    future_steps: 60
    num_heads: 8
    mlp_ratio: 4.0
    qkv_bias: False
    drop_path: 0.2

    # V1 params
    spike_depth: 4
    spike_mlp_ratio: 2.0
    spike_dropout: 0.05
    spike_tau: 2.5
    spike_v_threshold: 0.9
    spike_detach_reset: True
    ann_bypass_ratio: 0.0
    collect_aux_losses: True

    # V2 params
    interaction_type: hybrid  # spiking | hybrid | transformer
    interaction_depth: 5
    interaction_tau: 2.0
    interaction_v_threshold: 1.0
    interaction_detach_reset: True

    # V3 decoder params
    decoder_mode_depth: 2
    decoder_state_depth: 2
    decoder_hybrid_depth: 2
    decoder_tau: 2.0
    decoder_v_threshold: 1.0
    decoder_detach_reset: True
    decoder_dropout: 0.05
  pretrained_weights: ${pretrained_weights}
  lr: ${lr}
  weight_decay: ${weight_decay}
  epochs: ${epochs}
  warmup_epochs: ${warmup_epochs}
  spike_reg_weight: 0.001
  mem_reg_weight: 0.001
